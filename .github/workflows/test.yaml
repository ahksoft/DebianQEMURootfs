name: Build Debian Rootfs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  Build:
    runs-on: ${{ matrix.config.os }}
    container:
      image: ${{ matrix.config.image }}
      options: --privileged
    name: ${{ matrix.config.name }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              os: ubuntu-latest,
              suite: trixie,
              arch: arm64,
              qemu-arch: "aarch64",
              name: 'Debian-trixie-arm64',
              kernel: 'linux-image-arm64',
              artifact: 'debian-trixie-arm64',
              hostname: 'debian-trixie-arm64',
              qcow2: 'debian-trixie-arm64.qcow2',
              rootfs: 'debian-trixie-arm64.tar.xz',
              pool: 'http://deb.debian.org/debian',
              image: 'lazymio/qemu-full:v7.2.8',
              iface: 'eth0'
            }

    steps:
    - uses: actions/checkout@v4

    - name: '🚧 Mount binfmt_misc'
      shell: bash
      run: |
        mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc
        update-binfmts --display
        ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --importdir /opt/binfmt_fixed --unimport
        ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --importdir /opt/binfmt_fixed --import
        ls /opt/binfmt_fixed/ | awk '{print $1}' | xargs -L 1 update-binfmts --enable
        update-binfmts --display

    - name: '🚧 Dependency'
      shell: bash
      run: |
        apt update && apt install -y \
          libguestfs-tools \
          linux-image-generic \
          debian-ports-archive-keyring \
          aria2

    - name: '🚧 Debootstrap 1st stage'
      shell: bash
      run: |
        mkdir mnt
        debootstrap \
          --foreign \
          --arch=${{ matrix.config.arch }} \
          --include=locales \
          ${{ matrix.config.suite }} mnt/ ${{ matrix.config.pool }}

    - name: '🚧 Debootstrap 2nd stage'
      shell: bash
      run: |
        chroot mnt/ debootstrap/debootstrap --second-stage

    - name: '🚧 Install Kernel & fstab'
      shell: bash
      run: |
        echo 'fake /usr ext4 fake 0 1' > mnt/etc/fstab
        chroot mnt/ apt update
        chroot mnt/ apt install -y initramfs-tools

        # Use 'dep' — safer than 'list' for arm64
        sed -i 's/MODULES=most/MODULES=dep/' mnt/etc/initramfs-tools/initramfs.conf

        # Append kernel modules
        {
          echo "virtio_mmio"
          echo "virtio_blk"
          echo "virtio_net"
          echo "virtio_pci"
          echo "ext4"
          echo "sd_mod"
          echo "xhci_pci"
          echo "uhci_hcd"
          echo "ehci_pci"
          echo "usb_storage"
          echo "uas"
          echo "usbhid"
          echo "usbnet"
          echo "ax88179_178a"
          echo "r8152"
          echo "cdc_ether"
          echo "kvm"
          echo "kvm_arm"
          echo "vhost_net"
          echo "vhost"
          echo "tun"
        } >> mnt/etc/initramfs-tools/modules

        chroot mnt/ apt update
        chroot mnt/ apt install -y ${{ matrix.config.kernel }}
        echo '/dev/vda / ext4 errors=remount-ro 0 1' > mnt/etc/fstab

    - name: '🚧 Install Packages'
      shell: bash
      run: |
        chroot mnt/ apt install -y \
          openssh-server \
          sudo \
          x11-apps \
          x11-xserver-utils \
          xauth \
          xorg \
          xfce4 \
          xfce4-terminal \
          tigervnc-standalone-server \
          tigervnc-tools \
          dbus-x11 \
          net-tools \
          curl \
          wget \
          vim \
          htop \
          qemu-kvm \
          libvirt-daemon-system \
          cpu-checker

    - name: '🚧 Configure SSH — Full Access No Restrictions'
      shell: bash
      env:
        SSHD_CONFIG: |
          Port 22
          ListenAddress 0.0.0.0
          ListenAddress ::
          PermitRootLogin yes
          PasswordAuthentication yes
          PubkeyAuthentication yes
          AuthorizedKeysFile .ssh/authorized_keys
          PermitEmptyPasswords no
          ChallengeResponseAuthentication no
          UsePAM yes
          MaxAuthTries 10
          MaxSessions 20
          X11Forwarding yes
          X11DisplayOffset 10
          X11UseLocalhost no
          XAuthLocation /usr/bin/xauth
          AllowTcpForwarding yes
          GatewayPorts yes
          AllowStreamLocalForwarding yes
          PermitTunnel yes
          AllowAgentForwarding yes
          TCPKeepAlive yes
          ClientAliveInterval 60
          ClientAliveCountMax 10
          PrintMotd yes
          AcceptEnv LANG LC_* DISPLAY XAUTHORITY
          Subsystem sftp /usr/lib/openssh/sftp-server
      run: |
        echo "$SSHD_CONFIG" > mnt/etc/ssh/sshd_config

    - name: '🚧 Configure VNC'
      shell: bash
      env:
        VNC_XSTARTUP: |
          #!/bin/bash
          export DISPLAY=:1
          export XDG_SESSION_TYPE=x11
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          exec startxfce4
        VNC_START: |
          #!/bin/bash
          vncserver :1 \
            -geometry 1280x720 \
            -depth 24 \
            -localhost no \
            -SecurityTypes VncAuth \
            -rfbport 5901
          echo "VNC started on port 5901"
          echo "Tunnel: ssh -L 5901:localhost:5901 debian@<host> -p 22"
        VNC_STOP: |
          #!/bin/bash
          vncserver -kill :1
          echo "VNC stopped"
      run: |
        # debian user xstartup
        mkdir -p mnt/home/debian/.vnc
        echo "$VNC_XSTARTUP" > mnt/home/debian/.vnc/xstartup
        chmod +x mnt/home/debian/.vnc/xstartup

        # root user xstartup
        mkdir -p mnt/root/.vnc
        echo "$VNC_XSTARTUP" > mnt/root/.vnc/xstartup
        chmod +x mnt/root/.vnc/xstartup

        # vncstart / vncstop helpers
        echo "$VNC_START" > mnt/usr/local/bin/vncstart
        echo "$VNC_STOP"  > mnt/usr/local/bin/vncstop
        chmod +x mnt/usr/local/bin/vncstart
        chmod +x mnt/usr/local/bin/vncstop

    - name: '🚧 Configure Users & Permissions'
      shell: bash
      env:
        MOTD: |

          Debian Trixie ARM64 QEMU Image
          ================================
          Users : root/root  |  debian/debian
          debian has full passwordless sudo
          ================================
          SSH X11  : ssh -X debian@<host> -p 22
          VNC      : run 'vncstart' then connect :5901
          Tunnel   : ssh -L 5901:localhost:5901 debian@<host>
          KVM check: kvm-ok
          ================================

        KVM_UDEV: |
          KERNEL=="kvm", GROUP="kvm", MODE="0666"
        DEBIAN_SUDOERS: |
          debian ALL=(ALL:ALL) NOPASSWD: ALL
      run: |
        # Network
        echo ""                                          >> mnt/etc/network/interfaces
        echo "auto ${{ matrix.config.iface }}"          >> mnt/etc/network/interfaces
        echo "iface ${{ matrix.config.iface }} inet dhcp" >> mnt/etc/network/interfaces

        # Identity
        cat /dev/null > mnt/etc/machine-id
        echo '${{ matrix.config.hostname }}' > mnt/etc/hostname

        # Create debian user & set passwords
        chroot mnt bash -c "adduser --disabled-password --gecos '' debian"
        chroot mnt bash -c 'echo "root:root" | chpasswd'
        chroot mnt bash -c 'echo "debian:debian" | chpasswd'

        # Passwordless full sudo
        echo "$DEBIAN_SUDOERS" > mnt/etc/sudoers.d/debian
        chmod 440 mnt/etc/sudoers.d/debian

        # Group memberships
        chroot mnt bash -c "usermod -aG sudo,kvm,libvirt,video,audio,input,dialout,plugdev debian"

        # KVM udev rule
        echo "$KVM_UDEV" > mnt/etc/udev/rules.d/99-kvm.rules

        # VNC passwords (password: debian / root)
        chroot mnt bash -c "su - debian -c 'mkdir -p ~/.vnc && printf \"debian\ndebiandebian\n\" | vncpasswd && chmod 600 ~/.vnc/passwd'" || true
        chroot mnt bash -c "mkdir -p /root/.vnc && printf 'root\nrootroot\n' | vncpasswd && chmod 600 /root/.vnc/passwd" || true

        # Fix home ownership
        chroot mnt bash -c "chown -R debian:debian /home/debian"

        # MOTD
        echo "$MOTD" > mnt/etc/motd

    - name: '📦 Pack qcow2'
      shell: bash
      run: |
        mkdir artifact
        virt-make-fs --type=ext4 --size=5G mnt raw.img
        qemu-img convert -c -f raw -O qcow2 raw.img artifact/${{ matrix.config.qcow2 }}

    - name: '📦 Pack Initrd & Kernel'
      shell: bash
      run: |
        cp mnt/boot/vmlinu* ./artifact/
        cp mnt/boot/initrd.img-* ./artifact/

    - name: '📦 Pack Rootfs'
      shell: bash
      run: |
        tar caf artifact/${{ matrix.config.rootfs }} --one-file-system mnt

    - name: '📤 Upload artifact'
      uses: actions/upload-artifact@v4
      with:
        path: ./artifact/
        name: artifact-${{ matrix.config.arch }}

  publish:
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: artifact
          merge-multiple: true

      - name: '📦 Check artifacts'
        shell: bash
        run: |
          ls -la artifact/

      - name: '📦 Release'
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: ./artifact/*
