name: Build Debian Headless Rootfs (Full Power)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    container:
      image: ${{ matrix.config.image }}
      options: --privileged

    name: ${{ matrix.config.name }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              os: ubuntu-latest,
              suite: trixie,
              arch: arm64,
              name: "Debian-trixie-arm64",
              kernel: "linux-image-arm64",
              hostname: "debian-trixie-arm64",
              qcow2: "debian-trixie-arm64.qcow2",
              rootfs: "debian-trixie-arm64.tar.xz",
              pool: "http://deb.debian.org/debian",
              image: "lazymio/qemu-full:v7.2.8",
              iface: "eth0"
            }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mount binfmt_misc
        run: |
          mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc || true
          update-binfmts --display || true

      - name: Install dependencies
        run: |
          apt update && apt install -y \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            libguestfs-tools \
            aria2 \
            sudo \
            linux-image-generic

      - name: Debootstrap (stage 1)
        run: |
          mkdir mnt
          debootstrap \
            --foreign \
            --arch=${{ matrix.config.arch }} \
            --include=locales \
            ${{ matrix.config.suite }} mnt ${{ matrix.config.pool }}

      - name: Debootstrap (stage 2)
        run: |
          chroot mnt /debootstrap/debootstrap --second-stage

      - name: Install kernel & initramfs config
        run: |
          echo 'fake /usr ext4 fake 0 1' > mnt/etc/fstab

          chroot mnt apt update
          chroot mnt apt install -y initramfs-tools

          sed -i 's/MODULES=most/MODULES=dep/' mnt/etc/initramfs-tools/initramfs.conf

          cat <<'EOF' > mnt/etc/initramfs-tools/modules
virtio_mmio
virtio_blk
virtio_net
virtio_pci
ext4
sd_mod
xhci_pci
uhci_hcd
ehci_pci
usb_storage
uas
usbhid
usbnet
ax88179_178a
r8152
cdc_ether
kvm
kvm_arm
vhost_net
vhost
tun
EOF

          chroot mnt apt install -y ${{ matrix.config.kernel }}

          echo '/dev/vda / ext4 errors=remount-ro 0 1' > mnt/etc/fstab

      - name: Install core packages (no GUI)
        run: |
          chroot mnt apt install -y \
            openssh-server \
            sudo \
            net-tools \
            curl \
            wget \
            vim \
            htop \
            ca-certificates \
            dbus \
            systemd \
            systemd-sysv \
            iproute2 \
            iputils-ping \
            dnsutils \
            qemu-kvm \
            libvirt-daemon-system \
            cpu-checker

      - name: Configure SSH
        run: |
          cat > mnt/etc/ssh/sshd_config << 'EOF'
Port 22
ListenAddress 0.0.0.0
PermitRootLogin yes
PasswordAuthentication yes
PubkeyAuthentication yes
X11Forwarding yes
AllowTcpForwarding yes
GatewayPorts yes
PermitTunnel yes
EOF

      - name: Configure system
        run: |
          echo "${{ matrix.config.hostname }}" > mnt/etc/hostname

          echo "auto ${{ matrix.config.iface }}" > mnt/etc/network/interfaces
          echo "iface ${{ matrix.config.iface }} inet dhcp" >> mnt/etc/network/interfaces

          : > mnt/etc/machine-id

      - name: Configure users
        run: |
          chroot mnt adduser --disabled-password --gecos "" debian

          chroot mnt bash -c 'echo root:root | chpasswd'
          chroot mnt bash -c 'echo debian:debian | chpasswd'

          echo "debian ALL=(ALL:ALL) NOPASSWD: ALL" > mnt/etc/sudoers.d/debian
          chmod 440 mnt/etc/sudoers.d/debian

          chroot mnt usermod -aG sudo,kvm,libvirt,video,audio,input,dialout,plugdev debian

          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' > mnt/etc/udev/rules.d/99-kvm.rules

          chroot mnt chown -R debian:debian /home/debian

      - name: Create MOTD
        run: |
          cat > mnt/etc/motd << 'EOF'

Debian Trixie ARM64 (Headless)
==============================

Users:
  root / root
  debian / debian

Features:
  - SSH full access
  - KVM enabled
  - No GUI (lightweight)

EOF

      - name: Build QCOW2 image
        run: |
          mkdir -p artifact
          virt-make-fs --type=ext4 --size=5G mnt raw.img
          qemu-img convert -c -f raw -O qcow2 raw.img artifact/${{ matrix.config.qcow2 }}

      - name: Pack kernel & initrd
        run: |
          cp mnt/boot/vmlinuz* artifact/ || true
          cp mnt/boot/initrd.img-* artifact/ || true

      - name: Pack rootfs
        run: |
          tar caf artifact/${{ matrix.config.rootfs }} --one-file-system mnt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.config.arch }}
          path: artifact/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifact

      - name: List artifacts
        run: ls -lah artifact/

      - name: Release
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: artifact/**/*
